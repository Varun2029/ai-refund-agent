version: '3.8'

# ============================================================================
# AI Customer Support Operations Platform — Docker Compose
# ============================================================================

services:
  # ---------- PostgreSQL database ----------
  postgres:
    image: postgres:16-alpine
    container_name: refund_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: refund_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- FastAPI backend ----------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: refund_agent_api
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/refund_agent
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

volumes:
  pgdata:
    driver: local
