<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red;padding:20px;background:black;z-index:9999;position:absolute;top:0;left:0;width:100%;"><b>Error:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red;padding:20px;background:black;z-index:9999;position:absolute;top:0;left:0;width:100%;"><b>Unhandled Promise Rejection:</b> ' + e.reason + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
