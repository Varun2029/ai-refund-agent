services:
  - type: web
    name: refund-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: refund-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

databases:
  - name: refund-db
    databaseName: refund_agent
    user: admin
